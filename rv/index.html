<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지랄발광 3중주 - 시유 & 니나</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600&family=Noto+Sans+KR:wght@300;400&display=swap");
        :root { --bg: #050508; --panel: rgba(10, 10, 20, 0.9); --accent-nina: #f97316; --accent-seeu: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #f0eee8; font-family: "Noto Sans KR", sans-serif; overflow: hidden; }

        /* 레이어 구조 */
        #game-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #bg-layer { position: absolute; inset: 0; background-size: cover; background-position: center; transition: 1s; z-index: 1; }
        
        /* 캐릭터 레이어 */
        #char-layer { position: absolute; bottom: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-end; gap: 50px; z-index: 2; pointer-events: none; transition: 0.5s; }
        .char-img { height: 85vh; object-fit: contain; opacity: 0; transition: 0.4s; transform: translateY(30px); filter: brightness(0.6); }
        .char-img.show { opacity: 1; transform: translateY(0); }
        .char-img.active { filter: brightness(1.1) drop-shadow(0 0 20px rgba(255,255,255,0.2)); }

        /* 대화창 레이어 */
        #vn-ui { position: absolute; bottom: 0; width: 100%; padding: 40px 60px; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.1); z-index: 10; cursor: pointer; backdrop-filter: blur(10px); }
        #speaker { font-family: "Noto Serif KR", serif; font-size: 22px; margin-bottom: 10px; font-weight: bold; }
        #text { font-size: 20px; line-height: 1.8; min-height: 3em; }

        /* 리듬 게임 레이어 */
        #rhythm-layer { position: absolute; inset: 0; z-index: 20; display: none; background: rgba(0,0,0,0.7); flex-direction: column; align-items: center; }
        #rhythm-canvas { background: #000; border-left: 2px solid #333; border-right: 2px solid #333; }
        #hud { position: absolute; top: 20%; width: 100%; text-align: center; pointer-events: none; }
        #combo { font-size: 80px; font-weight: bold; color: #fff; }
        #judge { font-size: 30px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="bg-layer"></div>
    <div id="char-layer">
        <img id="img-nina" class="char-img" src="">
        <img id="img-seeu" class="char-img" src="">
    </div>
    <div id="vn-ui" onclick="onVnClick()">
        <div id="speaker"></div>
        <div id="text"></div>
    </div>
    <div id="rhythm-layer">
        <canvas id="rhythm-canvas"></canvas>
        <div id="hud">
            <div id="combo">0</div>
            <div id="judge">READY</div>
        </div>
    </div>
</div>

<audio id="audio-bgm" loop></audio>
<audio id="audio-game"></audio>

<script>
// 1. 게임 상태
let story = [];
let currentIdx = 0;
let isRhythmActive = false;
let combo = 0;
let chart = [];
const keys = ['s', 'd', 'f', 'j', 'k', 'l'];
const laneColors = ['#fff', '#9b8fff', '#60a5fa', '#60a5fa', '#9b8fff', '#fff'];

// 2. 엔진 초기화
async function init() {
    try {
        const res = await fetch('./data/story.json');
        story = await res.json();
        renderScene();
    } catch (e) { console.error("스토리 로딩 실패!", e); }
}

function onVnClick() {
    if (isRhythmActive) return;
    currentIdx++;
    if (currentIdx < story.length) renderScene();
}

function renderScene() {
    const s = story[currentIdx];
    if (s.type === "rhythm_start") { startRhythm(s); return; }

    // 배경 & 텍스트
    if (s.bg) document.getElementById('bg-layer').style.backgroundImage = `url(./assets/images/bg/${s.bg})`;
    document.getElementById('speaker').innerText = s.speaker || "";
    document.getElementById('speaker').style.color = s.active === "nina" ? "var(--accent-nina)" : "var(--accent-seeu)";
    document.getElementById('text').innerText = s.text;

    // 캐릭터 업데이트
    const nina = document.getElementById('img-nina');
    const seeu = document.getElementById('img-seeu');
    
    if (s.nina) { nina.src = `./assets/images/nina/${s.nina}`; nina.classList.add('show'); }
    if (s.seeu) { seeu.src = `./assets/images/seeu/${s.seeu}`; seeu.classList.add('show'); }

    nina.className = `char-img show ${s.active === 'nina' ? 'active' : ''}`;
    seeu.className = `char-img show ${s.active === 'seeu' ? 'active' : ''}`;
}

// 3. 리듬 게임 모듈
const canvas = document.getElementById('rhythm-canvas');
const ctx = canvas.getContext('2d');
const gameAudio = document.getElementById('audio-game');

canvas.width = 540;
canvas.height = window.innerHeight;

async function startRhythm(sceneData) {
    isRhythmActive = true;
    document.getElementById('rhythm-layer').style.display = "flex";
    document.getElementById('vn-ui').style.opacity = "0";
    document.getElementById('char-layer').style.filter = "blur(10px) brightness(0.5)";

    const res = await fetch(`./data/${sceneData.chart}`);
    chart = await res.json();
    chart.forEach(n => n.p = false); // 판정 상태 초기화

    gameAudio.src = `./assets/sounds/game/${sceneData.music}`;
    gameAudio.play();
    requestAnimationFrame(rhythmLoop);
}

function rhythmLoop() {
    if (!isRhythmActive) return;
    const cur = gameAudio.currentTime * 1000;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const hitY = canvas.height - 120;
    const laneW = canvas.width / 6;

    // 레인 & 판정선
    ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#ff4757"; ctx.fillRect(0, hitY, canvas.width, 4);

    // 노트 렌더링
    chart.forEach(n => {
        if (n.p && n.type !== 'long') return;
        const y = hitY + (cur - n.time) * 4.5;
        if (y < -200 || y > canvas.height + 200) return;

        ctx.fillStyle = laneColors[n.lane];
        if (n.type === 'short') {
            ctx.fillRect(n.lane * laneW + 5, y - 8, laneW - 10, 16);
        } else {
            const h = n.duration * 4.5;
            ctx.globalAlpha = 0.4; ctx.fillRect(n.lane * laneW + 15, y - h, laneW - 30, h); ctx.globalAlpha = 1;
            ctx.fillRect(n.lane * laneW + 5, y - 8, laneW - 10, 16);
        }

        // 미스 체크
        if (!n.p && y > hitY + 150) { n.p = true; combo = 0; updateHUD("MISS", "#ff4757"); }
    });

    if (gameAudio.ended) {
        setTimeout(endRhythm, 2000);
    } else {
        requestAnimationFrame(rhythmLoop);
    }
}

function updateHUD(j, c) {
    document.getElementById('combo').innerText = combo;
    document.getElementById('judge').innerText = j;
    document.getElementById('judge').style.color = c;
}

function endRhythm() {
    isRhythmActive = false;
    document.getElementById('rhythm-layer').style.display = "none";
    document.getElementById('vn-ui').style.opacity = "1";
    document.getElementById('char-layer').style.filter = "none";
    onVnClick();
}

window.onkeydown = (e) => {
    if (!isRhythmActive) return;
    const lane = keys.indexOf(e.key.toLowerCase());
    if (lane === -1) return;
    const cur = gameAudio.currentTime * 1000;
    const n = chart.find(note => note.lane === lane && !note.p && Math.abs(note.time - cur) < 150);
    if (n) {
        n.p = true; combo++;
        updateHUD("PERFECT", "#ffcc00");
    }
};

window.onload = init;
</script>
</body>
</html>
