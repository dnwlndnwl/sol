<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>지랄발광 에디터 ULTIMATE - 1/192 Master</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #0a0a0f;
                color: white;
                font-family: "Courier New", monospace;
                display: flex;
                height: 100vh;
                overflow: hidden;
            }
            #controls {
                width: 300px;
                min-width: 300px;
                background: #0d0d14;
                border-right: 1px solid #1e1e2e;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                overflow-y: auto;
            }
            h2 {
                font-size: 13px;
                letter-spacing: 2px;
                opacity: 0.5;
                border-bottom: 1px solid #1e1e2e;
                padding-bottom: 5px;
            }
            .section {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            label {
                font-size: 10px;
                opacity: 0.4;
                letter-spacing: 1px;
            }
            input,
            select {
                background: #111120;
                border: 1px solid #2a2a3a;
                color: white;
                padding: 8px;
                font-family: inherit;
                font-size: 13px;
                border-radius: 4px;
            }
            .btn {
                padding: 10px;
                background: transparent;
                border: 1px solid #4f46e5;
                color: #9b8fff;
                font-size: 11px;
                cursor: pointer;
                border-radius: 4px;
                text-align: center;
            }
            .btn:hover {
                background: rgba(79, 70, 229, 0.2);
            }
            .btn.success {
                border-color: #38a169;
                color: #68d391;
            }
            #editor {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                background: #050508;
                position: relative;
                padding-top: 10px;
            }
            #time-display {
                font-size: 36px;
                font-weight: bold;
                color: #7b6ff0;
                margin-bottom: 5px;
                font-variant-numeric: tabular-nums;
            }
            #lane-viewport {
                position: relative;
                width: 360px;
                height: 80vh;
                background: #000;
                border: 2px solid #1e1e2e;
                overflow: hidden;
            }
            canvas {
                position: absolute;
                top: 0;
                left: 0;
            }
            #hit-line {
                position: absolute;
                bottom: 100px;
                width: 100%;
                height: 3px;
                background: #ff4757;
                box-shadow: 0 0 15px #ff4757;
                z-index: 10;
            }
            #toast {
                position: absolute;
                top: 20px;
                right: 20px;
                background: rgba(79, 70, 229, 0.9);
                padding: 8px 15px;
                border-radius: 4px;
                font-size: 12px;
                opacity: 0;
                transition: 0.2s;
                z-index: 100;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div id="controls">
            <h2>FILES</h2>
            <div class="section">
                <label>1. Music</label
                ><input type="file" id="audioFile" accept="audio/*" />
            </div>
            <div class="section">
                <label>2. Chart Image</label
                ><input type="file" id="imgFile" accept="image/*" />
            </div>

            <h2>SYNC</h2>
            <div class="section">
                <label>BPM</label
                ><input type="number" id="bpmInput" value="118" />
            </div>
            <div class="section">
                <label>Image Y Offset (px)</label
                ><input type="number" id="imgOffset" value="0" step="1" />
            </div>

            <h2>EDITOR (Keys 1-9)</h2>
            <div class="section">
                <label>Speed</label>
                <select id="playbackRate">
                    <option value="0.25">0.25x (Precise)</option>
                    <option value="0.5">0.5x</option>
                    <option value="1.0" selected>1.0x</option>
                </select>
            </div>
            <div class="section">
                <label>Snap (9: 1/192)</label>
                <select id="snapSelect">
                    <option value="4">1/4</option>
                    <option value="8">1/8</option>
                    <option value="12">1/12</option>
                    <option value="16">1/16</option>
                    <option value="24">1/24</option>
                    <option value="32">1/32</option>
                    <option value="48">1/48</option>
                    <option value="96">1/96</option>
                    <option value="192" selected>1/192 (EXTREME)</option>
                </select>
            </div>

            <div class="section" style="margin-top: 10px">
                <button class="btn success" onclick="exportChart()">
                    SAVE JSON
                </button>
                <button
                    class="btn"
                    onclick="document.getElementById('importFile').click()"
                >
                    LOAD JSON
                </button>
                <input
                    type="file"
                    id="importFile"
                    accept=".json"
                    style="display: none"
                />
                <button
                    class="btn"
                    onclick="clearAll()"
                    style="border-color: #e53e3e; color: #fc8181"
                >
                    RESET
                </button>
            </div>
            <div
                style="
                    font-size: 10px;
                    opacity: 0.3;
                    line-height: 1.4;
                    margin-top: 5px;
                "
            >
                [1-9] 스냅 변경 (9: 1/192)<br />
                [UP/DOWN] 마지막 노트 미세조정<br />
                [D F J K] 입력 (Hold for Long)<br />
                [SPACE] 재생/정지 | [Z] Undo
            </div>
        </div>

        <div id="editor">
            <div id="time-display">00:00.000</div>
            <div id="lane-viewport">
                <canvas id="imgCanvas"></canvas>
                <canvas id="noteCanvas"></canvas>
                <div id="hit-line"></div>
            </div>
            <div style="font-size: 11px; opacity: 0.4; margin-top: 10px">
                NOTES: <span id="countVal">0</span> | PPS:
                <span id="ppsValDisplay">0</span>
            </div>
        </div>

        <div id="toast"></div>
        <audio id="audio"></audio>

        <script>
            const audio = document.getElementById("audio");
            const iCanvas = document.getElementById("imgCanvas");
            const iCtx = iCanvas.getContext("2d");
            const nCanvas = document.getElementById("noteCanvas");
            const nCtx = nCanvas.getContext("2d");
            const viewport = document.getElementById("lane-viewport");

            let chart = [];
            let overlayImg = new Image();
            let isImgLoaded = false;
            let activeHolds = [null, null, null, null];
            const keyMap = { d: 0, f: 1, j: 2, k: 3 };
            const snapMap = {
                1: 4,
                2: 8,
                3: 12,
                4: 16,
                5: 24,
                6: 32,
                7: 48,
                8: 96,
                9: 192,
            };

            iCanvas.width = nCanvas.width = viewport.clientWidth;
            iCanvas.height = nCanvas.height = viewport.clientHeight;

            document.getElementById("audioFile").onchange = (e) => {
                audio.src = URL.createObjectURL(e.target.files[0]);
            };
            document.getElementById("imgFile").onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    overlayImg.src = ev.target.result;
                };
                overlayImg.onload = () => {
                    isImgLoaded = true;
                    showToast("Image Loaded");
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            document.getElementById("importFile").onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    chart = JSON.parse(ev.target.result);
                    showToast("JSON Loaded");
                };
                reader.readAsText(e.target.files[0]);
            };
            document.getElementById("playbackRate").onchange = (e) => {
                audio.playbackRate = parseFloat(e.target.value);
            };

            function loop() {
                const cur = audio.currentTime;
                const m = Math.floor(cur / 60)
                    .toString()
                    .padStart(2, "0");
                const s = Math.floor(cur % 60)
                    .toString()
                    .padStart(2, "0");
                const ms = Math.floor((cur % 1) * 1000)
                    .toString()
                    .padStart(3, "0");
                document.getElementById("time-display").textContent =
                    `${m}:${s}.${ms}`;
                document.getElementById("countVal").textContent = chart.length;
                draw();
                requestAnimationFrame(loop);
            }

            function draw() {
                const cur = audio.currentTime;
                const bpm =
                    parseFloat(document.getElementById("bpmInput").value) ||
                    118;
                const offset = parseFloat(
                    document.getElementById("imgOffset").value,
                );
                const hitY = viewport.clientHeight - 100;
                const laneW = nCanvas.width / 4;

                // PPS 계산 (1마디 732px 기준 동기화)
                const viewScale = iCanvas.width / (overlayImg.width || 193);
                const pps = (732 * viewScale) / ((60 / bpm) * 4);
                document.getElementById("ppsValDisplay").textContent =
                    pps.toFixed(2);

                iCtx.clearRect(0, 0, iCanvas.width, iCanvas.height);
                nCtx.clearRect(0, 0, nCanvas.width, nCanvas.height);

                // 1. 그리드 (1/192 대응)
                const snap = parseInt(
                    document.getElementById("snapSelect").value,
                );
                const beatMs = 60000 / bpm;
                const unitMs = (beatMs * 4) / snap;
                const startMs = cur * 1000 - 1000;
                const endMs = cur * 1000 + 3000;
                let gt = Math.floor(startMs / unitMs) * unitMs;
                while (gt < endMs) {
                    const gy = hitY + (cur * 1000 - gt) * (pps / 1000);
                    const isMeasure = Math.abs(gt % (beatMs * 4)) < 2;
                    const isBeat = Math.abs(gt % beatMs) < 2;

                    if (isMeasure) {
                        nCtx.strokeStyle = "rgba(255,255,255,0.4)";
                        nCtx.lineWidth = 2;
                    } else if (isBeat) {
                        nCtx.strokeStyle = "rgba(255,255,255,0.2)";
                        nCtx.lineWidth = 1;
                    } else {
                        nCtx.strokeStyle = "rgba(123,111,240,0.08)";
                        nCtx.lineWidth = 0.5;
                    }

                    nCtx.beginPath();
                    nCtx.moveTo(0, gy);
                    nCtx.lineTo(nCanvas.width, gy);
                    nCtx.stroke();
                    gt += unitMs;
                }

                // 2. 이미지 낙하
                if (isImgLoaded) {
                    const drawW = iCanvas.width;
                    const drawH = overlayImg.height * viewScale;
                    const scrollY = hitY - drawH + cur * pps + offset;
                    iCtx.globalAlpha = 0.5;
                    iCtx.drawImage(overlayImg, 0, scrollY, drawW, drawH);
                    iCtx.globalAlpha = 1.0;
                }

                // 3. 노트 렌더링
                chart.forEach((n, idx) => {
                    const y = hitY + (cur - n.time / 1000) * pps;
                    const h = n.type === "long" ? (n.duration / 1000) * pps : 0;
                    if (y < -2000 || y - h > nCanvas.height + 1000) return;
                    const x = n.lane * laneW;
                    if (idx === chart.length - 1) {
                        nCtx.strokeStyle = "#ff4757";
                        nCtx.lineWidth = 3;
                        nCtx.strokeRect(x + 2, y - 8, laneW - 4, 16);
                    }
                    if (n.type === "long") {
                        nCtx.fillStyle = "rgba(155, 143, 255, 0.4)";
                        nCtx.fillRect(x + 12, y - h, laneW - 24, h);
                        nCtx.fillStyle = "#fff";
                        nCtx.fillRect(x + 4, y - h - 4, laneW - 8, 8);
                    }
                    nCtx.fillStyle =
                        n.lane === 0 || n.lane === 3 ? "#fff" : "#9b8fff";
                    nCtx.fillRect(x + 4, y - 4, laneW - 8, 8);
                });

                // 4. 실시간 입력 피드백
                activeHolds.forEach((startTime, lane) => {
                    if (startTime !== null) {
                        const x = lane * laneW;
                        const y = hitY + (cur - startTime / 1000) * pps;
                        const h = (cur * 1000 - startTime) * (pps / 1000);
                        nCtx.fillStyle = "rgba(123, 111, 240, 0.4)";
                        nCtx.fillRect(x + 12, y - h, laneW - 24, h);
                        nCtx.fillStyle = "rgba(255, 255, 255, 0.8)";
                        nCtx.fillRect(x + 4, y - 4, laneW - 8, 8);
                    }
                });
            }

            document.addEventListener("keydown", (e) => {
                const blocked = [
                    " ",
                    "ArrowUp",
                    "ArrowDown",
                    "ArrowLeft",
                    "ArrowRight",
                ];
                if (blocked.includes(e.key)) e.preventDefault();
                if (e.repeat) return;
                const key = e.key.toLowerCase();

                if (snapMap[key]) {
                    document.getElementById("snapSelect").value = snapMap[key];
                    showToast(`Snap: 1/${snapMap[key]}`);
                    return;
                }
                if (key === " ") {
                    audio.paused ? audio.play() : audio.pause();
                    return;
                }
                if (key === "z") {
                    chart.pop();
                    return;
                }
                if (e.key === "ArrowRight") {
                    audio.currentTime += 5;
                    return;
                }
                if (e.key === "ArrowLeft") {
                    audio.currentTime -= 5;
                    return;
                }

                if (
                    chart.length > 0 &&
                    (e.key === "ArrowUp" || e.key === "ArrowDown")
                ) {
                    const last = chart[chart.length - 1];
                    const snap = parseInt(
                        document.getElementById("snapSelect").value,
                    );
                    const unitMs =
                        ((60000 /
                            (parseFloat(
                                document.getElementById("bpmInput").value,
                            ) || 118)) *
                            4) /
                        snap;
                    last.time += e.key === "ArrowUp" ? unitMs : -unitMs;
                    if (last.time < 0) last.time = 0;
                    chart.sort((a, b) => a.time - b.time);
                    return;
                }

                const lane = keyMap[key];
                if (lane !== undefined)
                    activeHolds[lane] = audio.currentTime * 1000;
            });

            document.addEventListener("keyup", (e) => {
                const lane = keyMap[e.key.toLowerCase()];
                if (lane !== undefined && activeHolds[lane] !== null) {
                    const start = activeHolds[lane];
                    const end = audio.currentTime * 1000;
                    activeHolds[lane] = null;
                    const snap = parseInt(
                        document.getElementById("snapSelect").value,
                    );
                    const unitMs =
                        ((60000 /
                            (parseFloat(
                                document.getElementById("bpmInput").value,
                            ) || 118)) *
                            4) /
                        snap;
                    const sStart = Math.round(start / unitMs) * unitMs;
                    const sEnd = Math.round(end / unitMs) * unitMs;
                    const dur = sEnd - sStart;
                    const type = dur > 130 ? "long" : "short";
                    chart.push({
                        time: sStart,
                        lane: lane,
                        type: type,
                        duration: type === "long" ? dur : 0,
                    });
                    chart.sort((a, b) => a.time - b.time);
                }
            });

            function exportChart() {
                const blob = new Blob([JSON.stringify(chart, null, 2)], {
                    type: "application/json",
                });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "flos_master_192.json";
                a.click();
            }
            function showToast(msg) {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.opacity = 1;
                setTimeout(() => (t.style.opacity = 0), 1000);
            }
            function clearAll() {
                if (confirm("초기화?")) chart = [];
            }

            loop();
        </script>
    </body>
</html>
