<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>테스트</title>

        <style>
            body {
                margin: 0;
                background: black;
            }

            /* 전체 */
            #game {
                display: flex;
                width: 400px;
                height: 80vh;
                background: #111;
            }

            /* 라인 */
            .lane {
                flex: 1;
                border: 1px solid #333;
                position: relative;
                background: rgba(255, 255, 255, 0.05);
            }

            /* 노트 */
            .note {
                position: absolute;
                width: 80%;
                height: 20px;
                background: red;
                left: 10%;
                top: 0;
            }

            /* 판정선 */
            .hitline {
                position: absolute;
                bottom: 100px;
                width: 100%;
                height: 5px;
                background: yellow;
            }

            #wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: radial-gradient(circle, #222 0%, #000 70%);
            }

            #ui {
                position: absolute;
                top: 20px;
                left: 20px;
                color: white;
                font-size: 20px;
            }

            /* 판정 텍스트 */
            #judge {
                position: fixed;
                top: 40%;
                left: 50%;
                transform: translateX(-50%);
                color: white;
                font-size: 32px;
                pointer-events: none;
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <div id="wrapper">
            <div id="ui">
                <div id="score">Score: 0</div>
                <div id="combo">Combo: 0</div>
            </div>
            <div id="judge"></div>
            <div id="game">
                <div class="lane"></div>
                <div class="lane"></div>
                <div class="lane"></div>
                <div class="lane"></div>
            </div>
        </div>

        <script>
            const lanes = document.querySelectorAll(".lane");
            let score = 0;
            let combo = 0;
            const judgeEl = document.getElementById("judge");
            let judgeTimer = null;

            //판정선
            lanes.forEach((lane) => {
                const line = document.createElement("div");
                line.className = "hitline";
                lane.appendChild(line);
            });

            //키매핑
            const keyMap = {
                d: 0,
                f: 1,
                j: 2,
                k: 3,
            };

            // 노트 생성
            function showJudge(text, color) {
                judgeEl.innerText = text;
                judgeEl.style.color = color;
                clearTimeout(judgeTimer);
                judgeTimer = setTimeout(() => (judgeEl.innerText = ""), 500);
            }

            //노트 드롭
            function spawnNote(laneIndex) {
                const lane = lanes[laneIndex];

                const note = document.createElement("div");
                note.className = "note";
                note.dataset.hit = "false";
                lane.appendChild(note);

                let y = 0;
                const gameHeight = document.getElementById("game").offsetHeight;
                //드롭 속도
                const fall = setInterval(() => {
                    y += 20;
                    note.style.top = y + "px";
                    //키씹
                    if (y > gameHeight) {
                        clearInterval(fall);
                        if (note.dataset.hit === "false") {
                            note.dataset.hit = "true";
                            combo = 0;
                            showJudge("Miss", "gray");

                            document.getElementById("combo").innerText =
                                "Combo: " + combo;
                        }

                        note.remove();
                    }
                }, 16);
            }

            // 테스트용 자동 생성
            setInterval(() => {
                const randomLane = Math.floor(Math.random() * 4);
                spawnNote(randomLane);
            }, 1000);

            //키 입력
            document.addEventListener("keydown", (e) => {
                if (e.repeat) return;
                const laneIndex = keyMap[e.key];
                if (laneIndex === undefined) return;

                const lane = lanes[laneIndex];
                const notes = lane.querySelectorAll(".note");
                const line = lane.querySelector(".hitline");
                const lineTop = line.offsetTop;

                const note = Array.from(notes)
                    .filter((n) => n.dataset.hit === "false")
                    .find((n) => {
                        const nTop = n.offsetTop;
                        return Math.abs(nTop - lineTop) < 80;
                    });

                if (!note) return;

                const nTop = note.offsetTop;
                const diff = Math.abs(nTop - lineTop);

                let result = "";
                let color = "white";

                if (diff < 20) {
                    result = "Perfect";
                    color = "violet";
                    score += 300;
                    combo++;
                } else if (diff < 50) {
                    result = "Greats";
                    color = "cyan";
                    score += 100;
                    combo++;
                } else {
                    result = "Good";
                    color = "lime";
                    score += 100;
                    combo++;
                }

                showJudge(result, color);

                note.dataset.hit = "true";
                note.remove();

                document.getElementById("score").innerText = "Score: " + score;
                document.getElementById("combo").innerText = "Combo: " + combo;
            });
        </script>
    </body>
</html>
