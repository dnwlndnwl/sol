<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>지랄발광 채보 병합기</title>
        <style>
            body {
                background: #0a0a0f;
                color: white;
                font-family: monospace;
                padding: 50px;
                text-align: center;
            }
            .box {
                border: 2px dashed #4f46e5;
                padding: 40px;
                border-radius: 20px;
                background: #0d0d14;
            }
            input {
                display: none;
            }
            .btn {
                background: #4f46e5;
                color: white;
                padding: 15px 30px;
                cursor: pointer;
                border-radius: 8px;
                font-weight: bold;
            }
            #status {
                margin-top: 20px;
                color: #9b8fff;
            }
        </style>
    </head>
    <body>
        <h1>CHART MERGER</h1>
        <div class="box">
            <label class="btn" for="files"
                >JSON 파일들 선택 (다중 선택 가능)</label
            >
            <input type="file" id="files" accept=".json" multiple />
            <div id="status">파일을 선택해주세요.</div>
        </div>
        <br />
        <button
            class="btn"
            id="merge-btn"
            style="background: #38a169; display: none"
        >
            병합 및 다운로드
        </button>

        <script>
            let allNotes = [];
            const fileInput = document.getElementById("files");
            const mergeBtn = document.getElementById("merge-btn");
            const status = document.getElementById("status");

            fileInput.onchange = async (e) => {
                allNotes = [];
                const files = Array.from(e.target.files);

                for (const file of files) {
                    const text = await file.text();
                    const json = JSON.parse(text);
                    allNotes = allNotes.concat(json);
                }

                status.innerText = `${files.length}개의 파일 로드됨. 총 ${allNotes.length}개 노트.`;
                mergeBtn.style.display = "inline-block";
            };

            mergeBtn.onclick = () => {
                // 시간순 정렬
                allNotes.sort((a, b) => a.time - b.time);

                // 중복 제거
                const finalChart = allNotes.filter(
                    (n, i, self) =>
                        i ===
                        self.findIndex(
                            (t) => t.time === n.time && t.lane === n.lane,
                        ),
                );

                const blob = new Blob([JSON.stringify(finalChart, null, 2)], {
                    type: "application/json",
                });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "merged_master_chart.json";
                a.click();

                alert(
                    `병합 완료! 중복 제거 후 ${finalChart.length}개의 노트가 저장되었습니다.`,
                );
            };
        </script>
    </body>
</html>
